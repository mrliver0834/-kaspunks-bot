name: YONAMAXI Bot

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - name: Run bot
        env:
          TOKEN_YONAMAXI: ${{ secrets.TOKEN_YONAMAXI }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          THREAD_ID_YONAMAXI: ${{ secrets.THREAD_ID_YONAMAXI }}
        run: python yonamaxi_bot.py
